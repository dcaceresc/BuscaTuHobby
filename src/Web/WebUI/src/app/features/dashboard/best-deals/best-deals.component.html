<div class="card">
    <div class="card-body">
        <h5 class="card-title mb-3">Mejores Ofertas</h5>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Tienda</th>
                        <th>Descuento</th>
                        <th>Vistas</th>
                    </tr>
                </thead>
                <tbody>
                    @for (deal of deals(); track deal.inventoryId) {
                    <tr>
                        <td>{{ deal.productName }}</td>
                        <td><span class="badge bg-primary">{{ deal.storeName }}</span></td>
                        <td><span class="discount-badge">-{{ deal.discountPercentage }}%</span></td>
                        <td>{{ deal.productViewCount | number }}</td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
