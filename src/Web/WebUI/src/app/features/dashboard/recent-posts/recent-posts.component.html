<div class="mb-4">
  <h4 class="mb-3">Guías y Comparativas</h4>
  <div class="row">
    @for (post of posts(); track post.postId) {
      <div class="col-md-6 mb-3">
        <div class="card article-card">
          <div class="card-body">
            <span class="badge mb-2" [class]="getBadgeClass(post.postTypeName)">{{ post.postTypeName | uppercase }}</span>
            <h5 class="card-title">{{ post.postTitle }}</h5>
            <p class="text-muted">{{ post.postContent }}</p>
            <div class="d-flex justify-content-between align-items-center">
              <small class="text-muted"><i class="bi bi-eye"></i> {{ post.postViewCount | number }} vistas</small>
              <button class="btn btn-sm btn-outline-success" (click)="onReadMore(post.postId)">Leer más</button>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
