<div class="card">
  <div class="card-body">
    <h5 class="card-title mb-3">Categorías Populares</h5>
    @for (category of categories(); track category.categoryName) {
      <div class="mb-3">
        <div class="d-flex justify-content-between mb-1">
          <span>{{ category.categoryName }}</span>
          <span class="text-muted">{{ category.percentage }}%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" [style.width.%]="category.percentage"></div>
        </div>
      </div>
    }
  </div>
</div>
