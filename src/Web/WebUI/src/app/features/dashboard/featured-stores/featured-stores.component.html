<div class="mb-4">
  <h4 class="mb-3">Tiendas Destacadas</h4>
  <div class="row">
    @for (store of stores(); track store.storeId) {
      <div class="col-md-4 mb-3">
        <div class="card store-card">
          <div class="card-body">
            <div class="d-flex align-items-center mb-3">
              <i class="{{ store.storeIcon }} fs-2 text-primary me-3"></i>
              <div>
                <h5 class="mb-0">{{ store.storeName }}</h5>
                <small class="text-muted">{{ store.storeWebSite }}</small>
              </div>
            </div>
            <div class="d-flex justify-content-between">
              <span>{{ store.productCount | number }} productos</span>
              <span class="badge bg-danger">{{ store.offerCount }} ofertas</span>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
